site_name: Documentacion SportMatch

plugins:
  - render_swagger:
      allow_arbitrary_urls: false

theme:
  name: material
  language: es

  palette:
    - scheme: default
      primary: teal
      accent: orange
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: deep orange
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest

nav:
  - Inicio: index.md
  - Instalacion: instalacion.md
  - Guia Usuario: guia-usuario.md
  - API:
      - Notificaciones: notifications-api.md
      - Gestion de Reservas: api.md
  - Gestion de Proyecto:
      - Uso de git: uso-git.md
      - Historias de Usuario: historias-usuario.md
  - Integraciones: integraciones.md

markdown_extensions:
  - tables
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
